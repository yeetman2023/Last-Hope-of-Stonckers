<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Last_Hope_Of_Stonckers_❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: url('download.jpeg') center center / cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.1);
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      padding: 40px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.45);
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 15px;
      text-shadow: 0 0 10px black;
    }

    p {
      font-size: 1.3rem;
      opacity: 0.9;
    }

    .btn {
      margin-top: 25px;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: #ffb347;
      color: black;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.25s ease;
      font-weight: bold;
    }

    .btn:hover {
      transform: scale(1.08);
      background: #ffd27f;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>MEGABONK MONKE</h1>
    <p>Return to monke.</p>
    <button class="btn" onclick="alert('BONK.')">BONK</button>
  </div>
</body>
</html>
